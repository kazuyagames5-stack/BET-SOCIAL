# Configuração de Performance Nginx - BET SOCIAL HQ
# Nível: Infraestrutura Crítica (Maicon Sanches Edition)

# 1. Otimização de Conexões do Sistema Operacional (Worker)
worker_processes auto;
worker_rlimit_nofile 65535;

# 2. Definição de Zonas de Segurança (Anti-DDoS e Anti-Bot)
limit_req_zone $binary_remote_addr zone=one:20m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=addr:20m;

upstream backend_servers {
    least_conn; 
    
    # Keepalive mantém a conexão aberta com o backend, reduzindo latência em 30%
    keepalive 64; 

    # Servidores Ativos com Verificação Agressiva
    server srv1.betsocial.com:8080 max_fails=5 fail_timeout=10s;
    server srv2.betsocial.com:8080 max_fails=5 fail_timeout=10s;
    
    # Reserva de Emergência (Hot Standby)
    server srv3.betsocial.com:8080 backup; 
}

server {
    listen 80;
    listen 443 ssl http2; # HTTP/2 para carregamento instantâneo
    server_name betsocial.com;

    # 3. Blindagem SSL (Padrão Bancário TLS 1.3)
    # Nota: Substitua pelos caminhos dos seus certificados
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    # 4. Cabeçalhos de Segurança (Proteção Contra Injeção e Clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # 5. Compressão Gzip (Economiza banda e acelera o app para o cliente)
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_vary on;

    location / {
        # Encaminhamento Inteligente
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Necessário para o keepalive funcionar
        
        # Repasse de IPs Reais para Auditoria Financeira
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 6. Proteção de Fluxo (Rate Limiting Dinâmico)
        limit_req zone=one burst=50 nodelay; 
        limit_conn addr 20; # Máximo de 20 conexões simultâneas por IP

        # 7. Timeouts de Resiliência (Não deixa o cliente esperando)
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        
        # Buffer de Alta Performance para evitar "Broken Pipes"
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;
    }

    # 8. Cache de Assets Estáticos (Slots e Interface)
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|woff|woff2|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        proxy_pass http://backend_servers;
    }

    # Erros Customizados (Mantém o branding mesmo no caos)
    error_page 502 503 504 /custom_error.html;
    location = /custom_error.html {
        root /usr/share/nginx/html;
        internal;
    }
}
